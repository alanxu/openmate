<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OpenMate</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="section-switch">
        <button type="button" class="section-tab active" data-section="tasks">Tasks</button>
        <button type="button" class="section-tab" data-section="libraries">Libraries</button>
        <button type="button" class="section-tab" data-section="projects">Projects</button>
      </div>
      <button id="new-btn" class="new-task-btn">+ New task</button>
      <div id="nav-list" class="nav-list"></div>
    </aside>

    <main class="main">
      <!-- Task screen: chat + trajectory + attachment bar -->
      <section id="screen-task" class="screen">
        <div id="task-attach" class="attach-bar hidden"></div>
        <div id="messages" class="messages">
          <div class="empty-state">
            <div class="empty-title">OpenMate</div>
            <div class="empty-sub">Start a new task to begin.</div>
          </div>
        </div>
        <form id="composer" class="composer">
          <textarea id="input" placeholder="Message OpenMate…" rows="1"></textarea>
          <button id="send-btn" type="submit">Send</button>
        </form>
      </section>

      <!-- Library manager screen -->
      <section id="screen-library" class="screen hidden">
        <div id="library-view" class="entity-view"></div>
      </section>

      <!-- Project editor screen -->
      <section id="screen-project" class="screen hidden">
        <div id="project-view" class="entity-view"></div>
      </section>
    </main>
  </div>

  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-box">
      <div id="modal-title" class="modal-title"></div>
      <textarea id="modal-textarea" class="modal-field hidden" rows="6"></textarea>
      <input id="modal-input" class="modal-field hidden" type="text" />
      <div id="modal-list" class="modal-list hidden"></div>
      <div id="modal-form" class="modal-form hidden"></div>
      <div id="modal-error" class="modal-error hidden"></div>
      <div class="modal-actions">
        <button id="modal-cancel" type="button" class="modal-btn modal-btn-secondary">Cancel</button>
        <button id="modal-ok" type="button" class="modal-btn modal-btn-primary">Add</button>
      </div>
    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
